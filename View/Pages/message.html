<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages – Stay Connected</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="message.css" />
</head>
<body>

  <!-- ── Hero ───────────────────────────────────────────────────── -->
  <section class="hero">
    <div class="hero-blob hero-blob--left"></div>
    <div class="hero-blob hero-blob--right"></div>
    <div class="hero-content animate-in">
      <span class="hero-badge">💬 Messages</span>
      <h1 class="hero-title">Stay Connected</h1>
      <p class="hero-subtitle">Chat with teachers and staff in real-time</p>
    </div>
  </section>

  <!-- ── Chat Section ───────────────────────────────────────────── -->
  <section class="chat-section">
    <div class="container">
      <div class="chat-shell animate-in">

        <!-- Left: Conversation list -->
        <aside class="conv-panel">
          <div class="conv-search-wrap">
            <svg class="conv-search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="convSearch" class="conv-search" type="text" placeholder="Search conversations..." />
          </div>

          <ul id="convList" class="conv-list" role="listbox"></ul>
        </aside>

        <!-- Right: Chat window -->
        <div class="chat-window">

          <!-- Chat header -->
          <div class="chat-header">
            <div class="chat-header-info">
              <div class="avatar-wrap" id="headerAvatar">
                <span class="avatar-emoji" id="headerEmoji"></span>
                <span class="online-dot hidden" id="headerOnline"></span>
              </div>
              <div>
                <div class="chat-header-name" id="headerName"></div>
                <div class="chat-header-role" id="headerRole"></div>
              </div>
            </div>
            <div class="chat-header-actions">
              <div class="more-menu-wrap">
                <button class="icon-btn" title="More options" id="moreBtn" onclick="toggleMoreMenu()">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                </button>
                <div class="more-menu hidden" id="moreMenu">
                  <button onclick="handleMoreOption('mute')" id="muteBtn">Mute Notifications</button>
                  <button onclick="handleMoreOption('clear')">Clear Chat</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Messages -->
          <div class="messages-area" id="messagesArea"></div>

          <!-- Input -->
          <div class="input-area">
            <div class="input-tools">
              <button class="icon-btn" title="Attach file" onclick="handleAttach()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <button class="icon-btn" title="Send image" onclick="handleImage()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </button>
            </div>

            <div class="textarea-wrap">
              <textarea id="msgInput" class="msg-textarea" rows="1" placeholder="Type your message..."></textarea>
              <button class="icon-btn emoji-btn" title="Emoji" onclick="handleEmoji()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              </button>
            </div>

            <button class="send-btn" id="sendBtn" title="Send">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>

        </div><!-- /chat-window -->
      </div><!-- /chat-shell -->
    </div>
  </section>

  <!-- File input (hidden, triggered by attach/image buttons) -->
  <input type="file" id="fileInput" class="hidden" />
  <input type="file" id="imageInput" class="hidden" accept="image/*" />

  <!-- Toast -->
  <div id="toast" class="toast hidden">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 12 4 10"/></svg>
    <span id="toastMsg"></span>
  </div>

  <script src="message.js"></script>
</body>
</html>
